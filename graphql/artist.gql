query AllArtists($first: IntType = 500, $skip: IntType = 0) {
	allArtists(first: $first, skip: $skip, orderBy: [lastName_ASC], filter: { hidden: { eq: false } }) {
		...ArtistFragment
	}
	_allArtistsMeta {
		count
	}
}
query Artist($slug: String!) {
	artist(filter: { slug: { eq: $slug } }) {
		...ArtistFragment
	}
}

fragment ArtistFragmentLight on ArtistRecord {
	id
	firstName
	lastName
	image {
		...ImageFragment
	}
	slug
}

fragment ArtistFragment on ArtistRecord {
	id
	firstName
	lastName
	biography(markdown: false)
	image {
		...ImageFragment
	}
	artwork {
		...ImageFragment
	}
	artworkThumbnails: artwork {
		...ImageThumbnailFragment
	}
	slug
	soloExhibitions {
		additionalText
		text
		updatedAt
		year
		location
	}
	groupExhibitions {
		additionalText
		text
		updatedAt
		year
		location
	}
	education {
		additionalText
		text
		updatedAt
		year
		location
	}
	represented {
		additionalText
		text
		updatedAt
		year
		location
	}
	publications {
		additionalText
		text
		updatedAt
		year
		location
	}
	performances {
		additionalText
		text
		updatedAt
		year
		location
	}
}
